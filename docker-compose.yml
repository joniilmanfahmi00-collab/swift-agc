version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: gancang_nginx
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: always

  php:
    build:
      context: ./docker/php
    container_name: gancang_php
    volumes:
      - ./public:/var/www/html
      # Ieu bagian PENTING: Nyambungkeun folder database ti mesin Python ka PHP
      - ./engine/data:/var/www/data 
    restart: always